<!DOCTYPE html>
<html lang="id">
<head>
    <title>Admin Panel</title>
</head>
<body>
    <h2>Admin Panel - Tambah Video</h2>
    <input type="text" id="name" placeholder="Judul Video" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="video_url" placeholder="Link Video URL" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="thumbnail_url" placeholder="Link Gambar Thumbnail" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="access_code" placeholder="Access Code (Contoh: bopent)" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="saveData()" style="width:100%; padding:10px; background:#28a745; color:white; border:none;">Simpan ke Database</button>
    <div id="result" style="margin-top:20px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        async function saveData() {
            const { error } = await client.from('videos_list').insert([{
                name: document.getElementById('name').value,
                video_url: document.getElementById('video_url').value,
                thumbnail_url: document.getElementById('thumbnail_url').value,
                access_code: document.getElementById('access_code').value
            }]);
            if (!error) {
                document.getElementById('result').innerHTML = "Sukses! Link: " + window.location.origin + "/player.html?folder=" + document.getElementById('access_code').value;
            } else {
                alert("Gagal: " + error.message);
            }
        }
    </script>
</body>
</html>
