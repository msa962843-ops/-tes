<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }</style>
</head>
<body>
    <h2>Admin Panel</h2>
    <input type="text" id="f_id" placeholder="Nama Folder (Contoh: viral)" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="v_title" placeholder="Judul Video" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="v_url" placeholder="Link Video" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="t_url" placeholder="Link Thumbnail" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="saveVideo()" style="width:100%; padding:10px; background:#28a745; color:white; border:none;">Simpan Video</button>
    <div id="result" style="margin-top:20px; word-break:break-all;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        async function saveVideo() {
            const f = document.getElementById('f_id').value;
            await client.from('videos').insert([{
                folder_id: f,
                title: document.getElementById('v_title').value,
                video_url: document.getElementById('v_url').value,
                thumbnail_url: document.getElementById('t_url').value
            }]);
            document.getElementById('result').innerHTML = "Link Folder siap dibagikan:<br><b>" + window.location.origin + "/player.html?folder=" + f + "</b>";
        }
    </script>
</body>
</html>
