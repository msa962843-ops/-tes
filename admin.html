<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Input Video</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Tambah Data Video</h2>
    <input type="text" id="name" placeholder="Judul Video">
    <input type="text" id="video_url" placeholder="Link Video URL (MP4/Iframe)">
    <input type="text" id="thumbnail_url" placeholder="Link Thumbnail (Untuk Social Preview)">
    <input type="text" id="access_code" placeholder="Access Code (Contoh: video123)">
    <button onclick="saveData()">Simpan ke Supabase</button>
    <div id="result"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        async function saveData() {
            const { error } = await client.from('videos_list').insert([{
                name: document.getElementById('name').value,
                video_url: document.getElementById('video_url').value,
                thumbnail_url: document.getElementById('thumbnail_url').value,
                access_code: document.getElementById('access_code').value
            }]);
            if (!error) {
                document.getElementById('result').innerHTML = "Sukses! Akses melalui: /player.html?folder=" + document.getElementById('access_code').value;
            } else {
                alert("Error: " + error.message);
            }
        }
    </script>
</body>
</html>
