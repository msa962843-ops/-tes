<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">   
    <title>Video Player</title>
    <style>
        body { margin: 0; background: #050505; height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #player-container { width: 100%; max-width: 800px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; }
        video, iframe { width: 100%; height: 100%; border: none; }
        #status-msg { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="player-area" class="video-wrapper">Memuat...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function init() {
            const code = new URLSearchParams(window.location.search).get('folder');
            const area = document.getElementById('player-area');

            if (!code) {
                area.innerHTML = "<div id='status-msg'>Video tidak ditemukan.</div>";
                return;
            }

            try {
                const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();

                if (data) {
                    document.title = data.name;
                    area.innerHTML = data.video_url.includes('.mp4') 
                        ? `<video src="${data.video_url}" controls autoplay playsinline></video>`
                        : `<iframe src="${data.video_url}" allowfullscreen></iframe>`;
                } else {
                    area.innerHTML = "<div id='status-msg'>Data video tidak valid.</div>";
                }
            } catch (err) {
                area.innerHTML = "<div id='status-msg'>Gagal memuat video.</div>";
            }
        }

        init();
    </script>

    <script type="text/javascript">
        var _Hasync = _Hasync || [];
        _Hasync.push(['Histats.start','1,4971849,4,0,0,0,00000000']);
        _Hasync.push(['Histats.fasi','1']);
        _Hasync.push(['Histats.track_hits','']);
        (function() {
            var hs = document.createElement('script'); 
            hs.type = 'text/javascript'; 
            hs.async = true;
            hs.src = ('https:' == document.location.protocol ? 'https://' : 'http://') + 's10.histats.com/js15_as.js';
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(hs);
        })();
    </script>
</body>
</html>
