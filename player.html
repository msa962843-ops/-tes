<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta id="og-title" property="og:title" content="Video Player" />
    <meta property="og:type" content="video.movie" />
    <meta id="og-image" property="og:image" content="https://via.placeholder.com/600" />
    <meta id="og-video" property="og:video" content="" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <title>Video Player</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #player-area { width: 100%; height: 100%; cursor: pointer; }
        iframe, video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="player-area">Memuat...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function init() {
            const code = new URLSearchParams(window.location.search).get('folder');
            if (!code) return;

            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();

            if (data) {
                // Update Meta Tag (Untuk Preview Social Media)
                document.getElementById('og-title').setAttribute('content', data.name);
                document.getElementById('og-image').setAttribute('content', data.thumbnail_url || 'https://via.placeholder.com/600');
                document.getElementById('og-video').setAttribute('content', data.video_url);
                document.title = data.name;

                // Render Player
                const area = document.getElementById('player-area');
                area.innerHTML = data.video_url.includes('.mp4') 
                    ? `<video src="${data.video_url}" controls autoplay playsinline></video>`
                    : `<iframe src="${data.video_url}" frameborder="0" allowfullscreen></iframe>`;
                
                setupAd();
            }
        }

        function setupAd() {
            const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
            document.getElementById('player-area').addEventListener('click', function() {
                const now = new Date().getTime();
                if (now - (localStorage.getItem('lastAd') || 0) > 60000) {
                    window.open(adUrl, '_blank');
                    localStorage.setItem('lastAd', now);
                }
            });
        }
        init();
    </script>
</body>
</html>
