<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta id="og-title" property="og:title" content="Koleksi Video">
    <meta id="tw-title" name="twitter:title" content="Koleksi Video">
    <meta id="og-image" property="og:image" content="">
    <meta id="tw-image" name="twitter:image" content="">
    
    <title>Video Player</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; }
        /* Menggunakan gambar dari Admin untuk Thumbnail Video */
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h1 id="f-title">Memuat...</h1>
    <div class="grid" id="video-list"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const folder = new URLSearchParams(window.location.search).get('folder');
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function loadFolder() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', folder);
            
            if (data && data.length > 0) {
                // 1. SET THUMBNAIL LINK (Preview Social Media)
                const socialThumb = data[0].thumbnail_url || 'https://via.placeholder.com/600';
                document.getElementById('og-image').setAttribute('content', socialThumb);
                document.getElementById('tw-image').setAttribute('content', socialThumb);
                document.getElementById('og-title').setAttribute('content', "Koleksi " + folder);
                document.getElementById('tw-title').setAttribute('content', "Koleksi " + folder);
                
                document.getElementById('f-title').innerText = "Folder: " + folder;
                
                const list = document.getElementById('video-list');
                data.forEach(v => {
                    // 2. SET THUMBNAIL VIDEO DI HALAMAN (Menggunakan gambar dari Admin)
                    const videoThumb = v.thumbnail_url || 'https://via.placeholder.com/200';
                    list.innerHTML += `
                        <div class="card">
                            <img src="${videoThumb}" alt="Thumbnail">
                            <h3>${v.name}</h3>
                            <button onclick="window.open('${v.video_url}', '_blank')">Tonton</button>
                        </div>
                    `;
                });
            }
        }
        loadFolder();
    </script>
</body>
</html>
