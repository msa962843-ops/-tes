<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Player Video</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="video-container">
        <h1 id="video-title">Memuat...</h1>
        <video id="main-video" controls width="100%">
            <source src="" type="video/mp4">
            Browser Anda tidak mendukung video.
        </video>
    </div>

    <script>
        // 1. Ambil kode dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const folder = urlParams.get('folder');

        // 2. Inisialisasi Supabase (gunakan anon key)
        const supabase = supabase.createClient('URL_SUPABASE_ANDA', 'ANON_KEY_ANDA');

        async function loadVideo() {
            const { data, error } = await supabase
                .from('videos_list')
                .select('*')
                .eq('access_code', folder)
                .single();

            if (data) {
                document.getElementById('video-title').innerText = data.name;
                const video = document.getElementById('main-video');
                video.src = data.video_url; // Pastikan kolom ini ada di Supabase
            } else {
                alert("Video tidak ditemukan!");
            }
        }

        loadVideo();
    </script>
