<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #player-area { width: 100%; height: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        iframe, video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div id="player-area">Memuat Video...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function init() {
            const code = new URLSearchParams(window.location.search).get('folder');
            if (!code) {
                document.getElementById('player-area').innerText = "Link tidak valid.";
                return;
            }

            const { data, error } = await client.from('videos_list').select('*').eq('access_code', code).single();

            if (data) {
                document.title = data.name;
                const area = document.getElementById('player-area');
                
                // Render Player
                area.innerHTML = data.video_url.includes('.mp4') 
                    ? `<video src="${data.video_url}" controls autoplay playsinline></video>`
                    : `<iframe src="${data.video_url}" frameborder="0" allowfullscreen></iframe>`;
                
                // Panggil fungsi iklan
                setupAd();
            } else {
                document.getElementById('player-area').innerText = "Video tidak ditemukan.";
            }
        }

        function setupAd() {
            const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
            document.getElementById('player-area').addEventListener('click', function(e) {
                // Jangan buka iklan kalau yang diklik adalah kontrol video
                if (e.target.tagName === 'VIDEO') return; 
                
                const now = new Date().getTime();
                if (now - (localStorage.getItem('lastAd') || 0) > 60000) {
                    window.open(adUrl, '_blank');
                    localStorage.setItem('lastAd', now);
                }
            });
        }

        // Jalankan Inisialisasi
        init();
    </script>
